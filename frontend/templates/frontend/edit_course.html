<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditer le cours - {{ course.title }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'frontend/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="{% url 'home' %}" class="logo">
                <i class="fas fa-graduation-cap"></i> E-learning
            </a>
            <div class="user-info">
                <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Retour au dashboard
                </a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">
                <i class="fas fa-edit"></i> Éditer le cours
            </h1>
            <p class="dashboard-subtitle">{{ course.title }}</p>
        </div>

        <div class="form-container">
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-heading"></i> Titre du cours
                    </label>
                    <input type="text" name="title" class="form-control" 
                           value="{{ course.title }}" 
                           placeholder="Ex: Introduction à la programmation Python" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-align-left"></i> Description
                    </label>
                    <textarea name="description" class="form-control" rows="5" 
                              placeholder="Décrivez en détail le contenu de ce cours..." required>{{ course.description }}</textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-book-open"></i> Contenu détaillé
                    </label>
                    <textarea name="content" class="form-control" rows="12" 
                              placeholder="Structurez le contenu de votre cours (modules, chapitres, exercices)...">{{ course.content }}</textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-save"></i> Enregistrer les modifications
                    </button>
                    <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary btn-block mt-2">
                        <i class="fas fa-times"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
